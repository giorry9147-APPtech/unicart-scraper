# fly.toml — generated for unicart-scraper
# Run `fly launch --copy-config --no-deploy` once to create the app, then
# `fly secrets set SCRAPER_TOKEN=<your-token>` and `fly deploy`.

app = "unicart-scraper"
primary_region = "ams"

[build]
  dockerfile = "dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine warm — playwright cold-start adds ~10s and Vercel
  # functions only get 60s total. Free tier can comfortably run 1 always-on
  # shared-cpu-1x machine.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
